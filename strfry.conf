##
## strfry local relay config (backup-relay)
## docs: https://github.com/hoytech/strfry/blob/master/strfry.conf
##

# Directory that contains the strfry LMDB database (relative to current dir)
db = "./strfry-db/"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760   # 10TB (sparse, only actual data uses disk)
    noReadAhead = false
}

events {
    maxEventSize = 131072          # match x.kojira.io max_message_length
    rejectEventsNewerThanSeconds = 900
    # Keep ALL historical events. strfry sync also honors this limit, so the
    # default 3y (94608000) silently drops posts older than 3 years. Set huge.
    rejectEventsOlderThanSeconds = 3153600000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7777

    nofiles = 1000000
    realIpHeader = ""

    info {
        name = "backup-relay"
        description = "Local backup relay for koteitan kind:1/kind:6"
        pubkey = ""
        contact = ""
    }

    maxWebsocketPayloadSize = 131072
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxSubsPerConnection = 100

    writePolicy {
        plugin = ""
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }
}
